version: '3.8'

services:
  api:
    build: .
    command: ["api"]
    ports:
      - "3000:3000"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - HOST=0.0.0.0
    volumes:
      - transcribe_data:/tmp/transcribe
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: ["worker"]
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
    volumes:
      # Важно: монтируем ту же самую директорию, чтобы воркер видел файлы, сохраненные API
      - transcribe_data:/tmp/transcribe
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672" # Админка (по умолчанию guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  transcribe_data: